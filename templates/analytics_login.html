<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Battle — Analytics Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    h1 {
      font-size: 1.4rem;
      color: #31ceb0;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    p {
      color: #64748b;
      font-size: 0.85rem;
      margin-bottom: 28px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
      margin-bottom: 16px;
      outline: none;
    }
    input[type="password"]:focus {
      border-color: #31ceb0;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #31ceb0;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
    }
    button:hover { background: #22d3b8; }
    .error {
      color: #f87171;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚔️ Analytics</h1>
    <p>Enter the admin password to access the dashboard</p>
    <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter') login()" autofocus />
    <button onclick="login()">Enter</button>
    <div class="error" id="err">Wrong password. Try again.</div>
  </div>

  <script>
    async function login() {
      const pw = document.getElementById('pw').value;
      const err = document.getElementById('err');
      err.style.display = 'none';
      try {
        const res = await fetch('/analytics/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw })
        });
        if (res.ok) {
          window.location.reload();
        } else {
          err.style.display = 'block';
          document.getElementById('pw').value = '';
          document.getElementById('pw').focus();
        }
      } catch (e) {
        err.textContent = 'Server error. Is Flask running?';
        err.style.display = 'block';
      }
    }
  </script>
</body>
</html>
